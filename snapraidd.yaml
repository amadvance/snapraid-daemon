openapi: 3.0.0
info:
  title: SnapRAID API
  description: Backend API for SnapRAID monitoring and control.
  version: 1.0.0

paths:
  /api/v1/probe:
    post:
      summary: Probe the spin status of all disks
      description: >
        Triggers a probe command for all data and parity disks in the array. 
        The server returns immediately with a 202 status, while the probe
        process continues in the background.
        Updated disk state will be available via the /v1/disks endpoint once
        the task is complete.
      responses:
        '202':
          description: Probe request accepted and scheduled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandResponse'

  /api/v1/up:
    post:
      summary: Spin up all disks
      description: >
        Triggers a spin-up command for all data and parity disks in the array. 
        The server returns immediately with a 202 status, while the physical 
        spin-up process continues in the background.
        Updated disk state will be available via the /v1/disks endpoint once
        the task is complete.
      responses:
        '202':
          description: Spin-up request accepted and scheduled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandResponse'

  /api/v1/down:
    post:
      summary: Spin down all disks
      description: >
        Triggers a spin-down command for all data and parity disks in the array. 
        The server returns immediately with a 202 status, while the physical 
        spin-down process continues in the background.
        Updated disk state will be available via the /v1/disks endpoint once
        the task is complete.
      responses:
        '202':
          description: Spin-down request accepted and scheduled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandResponse'

  /api/v1/smart:
    post:
      summary: Refresh SMART data for all disks
      description: >
        Triggers a background refresh of SMART attributes for all disks.
        The server returns 202 immediately, while the smart gathering
        process continues in the background.
        Updated disk state will be available via the /v1/disks endpoint once
        the task is complete.
      responses:
        '202':
          description: SMART refresh task accepted and scheduled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandResponse'

  /api/v1/sync:
    post:
      summary: Start a sync of the array
      description: >
        Triggers a sync of the array. 
        The server returns immediately with a 202 status, while the process
        continues in the background.
        Updated progress state will be available via the /v1/progress endpoint.
      requestBody:
        required: false  # The JSON requestBody body is optional
        description: Additional arguments to pass to the SnapRAID command
        content:
          application/json:
            schema:
              type: object
              properties:
                args:
                  type: array
                  items:
                    type: string
                  example: ["--force-zero", "--force-nocopy"]
      responses:
        '202':
          description: Sync request accepted and scheduled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandResponse'

  /api/v1/disks:
    get:
      summary: Get detailed status of all disks
      description: >
        Returns lists for data disks and parity disks with all the
        information available.
        Disks are not probed, but only information obtained from previous
        commands is returned.
      responses:
        '200':
          description: Disk lists retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data_disks:
                    type: array
                    description: "Ordered list of data disks (d1, d2, ...)"
                    items:
                      $ref: '#/components/schemas/DataDisk'
                  parity_disks:
                    type: array
                    description: "Ordered list of parity disks (parity, 2-parity, ...)"
                    items:
                      $ref: '#/components/schemas/ParityDisk'

  /api/v1/status:
    get:
      summary: Get current or last task state
      description: >
        Returns the state of the currently executing SnapRAID command. 
        If no command is running, it returns the final state of the 
        previously completed command. Returns 204 if no history exists.
      responses:
        '200':
          description: Task state retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '204':
          description: System is idle with no previous task history.

  /api/v1/queue:
    get:
      summary: List pending tasks
      description: >
        Returns a list of tasks currently queued and waiting for execution. 
        This includes both manually triggered commands and scheduled maintenance 
        tasks that are lined up behind a currently running process.
      responses:
        '200':
          description: A list of pending tasks.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'

  /api/v1/config:
    get:
      summary: Get current daemon configuration
      responses:
        '200':
          description: Configuration retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Config'
    patch:
      summary: Update configuration options
      description: Allows partial updates to the config.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Config'
      responses:
        '200':
          description: Configuration updated
        '400':
          description: Invalid configuration values

components:
  schemas:
    CommandResponse:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
          description: "True if the request was scheduled, false if an error occurred."
        message:
          type: string
          description: "Optional detail about the status or error."

    Task:
      type: object
      description: "Progress status of the running or latest command. Persists until a new command begins."
      required:
        - command
        - status
        - number
        - messages
        - errors
      properties:
        command:
          type: string
          enum: [probe, sync, scrub, fix, check, status, up, down, smart]
          description: "The latest command run or still running."
        status:
          type: string
          enum: [queued, initializing, starting, processing, finishing, interrupting, terminated, signaled]
          description: "If the command is running or it has finished."
        number:
          type: integer
          description: "Incremental number of task"
        exit_code:
          type: integer
          description: "Exit code of the SnapRAID process. Present only with status=terminated."
        exit_sig:
          type: integer
          description: "Signal code of the SnapRAID process. Present only with status=signaled."
        progress:
          type: integer
          description: "Completion percentage"
        eta_seconds:
          type: integer
          description: "Estimated time remaning in seconds"
        speed_mbs:
          type: integer
          description: "Realtime speed in Mbytes/s"
        cpu_usage:
          type: integer
          description: "CPU usage percentage"
        elapsed_seconds:
          type: integer
          description: "Elapsed time in seconds"
        block_begin:
          type: integer
          description: "Starting block index"
        block_end:
          type: integer
          description: "Ending block index + 1"
        block_count:
          type: integer
          description: "Number of blocks to process. It may be less than block_end - block_begin + 1 if some blocks are going to be skipped"
        block_idx:
          type: integer
          description: "Current block index position processed"
        block_done:
          type: integer
          description: "Number of blocks processed"
        size_done:
          type: integer
          format: int64
          description: "Size of blocks processed"
        messages:
          type: array
          description: "List of messages"
          items:
            type: string
        errors:
          type: array
          description: "List of errors found."
          items:
            $ref: '#/components/schemas/CommandError'

    CommandError:
      type: object
      required:
        - reference_type
        - message
        - disk_name
      properties:
        reference_type:
          type: string
          enum: [file, parity, directory, symlink, hardlink, outofparity]
        message:
          type: string
          description: "Nature of the error (e.g., checksum, read error, size mismatch)."
        disk_name:
          type: string
          description: "The SnapRAID name of the disk (e.g., d1, p1)."
          example: "d1"
        path:
          type: string
          description: "Primary path of the object. Used for files, directories, and links."
          example: "/mnt/d1/data/link_to_file"
        target_path:
          type: string
          description: "The destination of the link. Used only for symlink and hardlink types."
          example: "/mnt/d1/archive/original_file"
        block_number:
          type: integer
          format: int64
          description: "Block number where the error occurred (relevant for file and parity)."

    Device:
      type: object
      required:
        - device_node
      properties:
        device_node:
          type: string
          description: "System device path (e.g., /dev/sdb1)"
        family:
          type: string
          example: "Vendor and Model Family, like: Western Digital Red"
        model:
          type: string
          example: "WDC WD40EFRX-68N32N0"
        serial:
          type: string
          example: "WD-WCC7K1XN2L3P"          
        power:
          type: string
          enum: [active, standby]
          description: "Current power state of the physical drive"
        health:
          type: string
          enum: [passed, failing]
          description: "Current health state"
        size:
          type: integer
          format: int64
          description: "Size in bytes of the raw device"
        rotational:
          type: integer
          description: "If it's a rotational device, and the rotational speed"
        error:
          type: integer
          description: "Number of SMART errors"
        smart_reallocated_sector_count:
          type: integer
        smart_uncorrectable_error_cnt:
          type: integer
        smart_command_timeout:
          type: integer
        smart_current_pending_sector:
          type: integer
        smart_offline_uncorrectable:
          type: integer
        smart_start_stop_count:
          type: integer
        smart_power_on_hours:
          type: integer
        smart_load_cycle_count:
          type: integer
        smart_temperature_celsius:
          type: integer

    DataDisk:
      type: object
      required:
        - name
        - mount_dir
        - devices
      properties:
        name:
          type: string
          description: "Logical name (e.g., d1, d2)"
        mount_dir:
          type: string
          description: "Filesystem mount point path"
        uuid:
          type: string
          description: "Actual UUID of the filesystem containing the mount dir"
        stored_uuid:
          type: string
          description: "Stored UUID of the filesystem containing the mount dir"
        allocated_space_bytes:
          type: integer
          format: int64
        free_space_bytes:
          type: integer
          format: int64
        access_count:
          type: integer
          format: int64
          description: "Total number of read and write accesses performed on the device"
        access_count_initial_time:
          type: integer
          format: int64
          description: "Unix timestamp of the first recorded reading of access_count"
        access_count_idle_duration:
          type: integer
          format: int64
          description: "Duration for which access_count has remained unchanged"
        devices:
          type: array
          items:
            $ref: '#/components/schemas/Device'

    ParitySplit:
      type: object
      required:
        - parity_path
        - devices
      properties:
        parity_path:
          type: string
          description: "Path of the file of the parity"
        uuid:
          type: string
          description: "Actual UUID of the filesystem containing the parity file"
        stored_uuid:
          type: string
          description: "Stored UUID of the filesystem containing the parity file"
        devices:
          type: array
          items:
            $ref: '#/components/schemas/Device'

    ParityDisk:
      type: object
      required:
        - name
        - splits
      properties:
        name:
          type: string
          description: "Logical name (e.g., parity, 2-parity)"
        allocated_space_bytes:
          type: integer
          format: int64
        free_space_bytes:
          type: integer
          format: int64
        access_count:
          type: integer
          format: int64
          description: "Total number of read and write accesses performed on the device"
        access_count_initial_time:
          type: integer
          format: int64
          description: "Unix timestamp of the first recorded reading of access_count"
        access_count_idle_duration:
          type: integer
          format: int64
          description: "Duration for which access_count has remained unchanged"
        splits:
          type: array
          items:
            $ref: '#/components/schemas/ParitySplit'

    Config:
      type: object
      description: The global configuration state for the SnapRAID daemon.
      properties:
        scheduled_run:
          type: string
          example: "daily 02:00"
          description: >
            The time when the daemon starts the maintenance sequence (Sync followed by Scrub). 
            Format: "daily HH:MM" or "weekly <day> HH:MM". If empty, do nothing.
        scrub_percentage:
          type: integer
          minimum: 0
          maximum: 100
          example: 12
          description: "The percentage of the array to check during the scrub portion of the scheduled run. If 0, scrub is skipped."
        probe_interval_minutes:
          type: integer
          example: 30
          description: "Check SMART attributes every N minutes (only if disks are already spinning). If 0, monitoring is disabled."
        spindown_idle_minutes:
          type: integer
          example: 60
          description: "Automatically spindown idle disks after N minutes of inactivity. If 0, automatic spindown is disabled."
        report_differences:
          type: boolean
          example: true
          description: "Report a list of differences in the log during SnapRAID activity. If false, no difference are reported."
        suspend_on_deletes:
          type: integer
          example: 50
          description: "Suspend the sync if more than N files were deleted. If 0, the sync will never suspend regardless of deletes."
        pre_run_script:
          type: string
          example: "/usr/local/bin/pre-snapraid.sh"
          description: "Path to a script to execute before SnapRAID activity begins. If empty, do nothing."
        post_run_script:
          type: string
          example: "/usr/local/bin/post-snapraid.sh"
          description: "Path to a script to execute after SnapRAID activity finishes. If empty, do nothing."
        log_directory:
          type: string
          example: "/var/log/snapraid/"
          description: "Directory to store individual command logs (e.g. 20251225-sync.log). If empty, logs are not stored."
        log_retention_days:
          type: integer
          example: 30
          description: "Number of days to retain log files before deletion. If 0, logs are kept indefinitely."
        notify_syslog_enabled:
          type: boolean
          example: true
          description: >
            Enable logging daemon activity to the OS system log (syslog/journald). 
            Note: Critical lifecycle events (start, stop, reload) are ALWAYS logged 
            as long as this is true, regardless of the level set below.
            If false, nothing is logged to syslog
        notify_syslog_level:
          type: string
          enum: [critical, error, warning, info]
          example: "error"
          description: >
            Sensitivity level for SnapRAID task-related messages (sync, scrub, etc.). 
            If unset, assume 'critical'.
        notify_heartbeat_url:
          type: string
          format: uri
          example: "https://hc-ping.com/your-uuid-here"
          description: "URL to ping (GET request) on successful task completion (e.g. Healthchecks.io). If empty, do nothing."
        notify_apprise_url:
          type: string
          example: "ntfy://your-topic"
          description: "The Apprise URL/Connection string for push notifications (Discord, Telegram, etc). If empty, do nothing."
        notify_apprise_level:
          type: string
          enum: [critical, error, warning, info]
          description: "Sensitivity level for Apprise push alerts. If unset, assume 'critical'."
        notify_email_recipient:
          type: string
          format: email
          example: "admin@example.com"
          description: "Recipient address for local system mail reports. If empty, email notification is disabled."
        notify_email_level:
          type: string
          enum: [critical, error, warning, info]
          description: "Sensitivity level for local email reports. If unset, assume 'critical'."
