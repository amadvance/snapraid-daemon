openapi: 3.0.0
info:
  title: SnapRAID API
  description: Backend API for SnapRAID monitoring and control.
  version: 1.0.0

paths:
  /api/v1/probe:
    post:
      summary: Probe the spin status of all disks
      description: >
        Triggers a probe command for all data and parity disks in the array. 
        The server returns immediately with a 200 status, while the probe
        process continues in the background.
        Updated spinning state will be available via the /v1/disks endpoint
        once the task is complete.
      responses:
        '200':
          description: Probe request accepted and scheduled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandResponse'
        '409':
          description: Conflict - A SnapRAID task is already running.

  /api/v1/up:
    post:
      summary: Spin up all disks
      description: >
        Triggers a spin-up command for all data and parity disks in the array. 
        The server returns immediately with a 200 status, while the physical 
        spin-up process continues in the background.
        Updated spinning state will be available via the /v1/disks endpoint
        once the task is complete.
      responses:
        '200':
          description: Spin-up request accepted and scheduled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandResponse'
        '409':
          description: Conflict - A SnapRAID task is already running.

  /api/v1/down:
    post:
      summary: Spin down all disks
      description: >
        Triggers a spin-down command for all data and parity disks in the array. 
        The server returns immediately with a 200 status.
        Updated spinning state will be available via the /v1/disks endpoint
        once the task is complete.
      responses:
        '200':
          description: Spin-down request accepted and scheduled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandResponse'
        '409':
          description: Conflict - A SnapRAID task is already running.

  /api/v1/smart:
    post:
      summary: Refresh SMART data for all disks
      description: >
        Triggers a background refresh of SMART attributes for all disks.
        The server returns 200 immediately. 
        Updated data will be available via the /v1/disks endpoint once the
        task is complete.
      responses:
        '202':
          description: SMART refresh task accepted and scheduled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandResponse'
        '409':
          description: Conflict - A SnapRAID task is already running.

  /api/v1/sync:
    post:
      summary: Start a sync of the array
      description: >
        Triggers a sync of the array. 
        The server returns immediately with a 200 status, while the process
        continues in the background.
        Updated spinning state will be available via the /v1/progress endpoint.
      responses:
        '200':
          description: Probe request accepted and scheduled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandResponse'
        '409':
          description: Conflict - A SnapRAID task is already running.

  /api/v1/disks:
    get:
      summary: Get detailed status of all disks
      description: >
        Returns lists for data disks and parity disks with all the
        information available.
        Disks are not probed, but only information obtained from previous
        commands is returned.
      responses:
        '200':
          description: Disk lists retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data_disks:
                    type: array
                    description: "Ordered list of data disks (d1, d2, ...)"
                    items:
                      $ref: '#/components/schemas/DataDisk'
                  parity_disks:
                    type: array
                    description: "Ordered list of parity disks (parity, 2-parity, ...)"
                    items:
                      $ref: '#/components/schemas/ParityDisk'

  /api/v1/progress:
    get:
      summary: Poll current task progress
      description: Used by the frontend to update progress bars and status indicators.
      responses:
        '200':
          description: Progress data retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandProgress'

  /api/v1/config:
    get:
      summary: Get current daemon configuration
      responses:
        '200':
          description: Configuration retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Config'
    patch:
      summary: Update configuration options
      description: Allows partial updates to the config.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Config'
      responses:
        '200':
          description: Configuration updated
        '400':
          description: Invalid configuration values

components:
  schemas:
    CommandResponse:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
          description: "True if the request was scheduled, false if an error occurred."
        message:
          type: string
          description: "Optional detail about the status or error."

    CommandProgress:
      type: object
      description: "Progress status of the running or latest command. Persists until a new command begins."
      required:
        - command
        - status
        - messages
        - errors
      properties:
        command:
          type: string
          enum: [none, probe, sync, scrub, fix, check, status, up, down, smart]
          description: "The latest command run or still running."
        status:
          type: string
          enum: [initializing, starting, processing, finishing, interrupting, terminated, signaled]
          description: "If the command is running or it has finished."
        exit_code:
          type: integer
          description: "Exit code of the SnapRAID process. Present only with status=terminated."
        exit_sig:
          type: integer
          description: "Signal code of the SnapRAID process. Present only with status=signaled."
        progress:
          type: integer
          description: "Completion percentage"
        eta_seconds:
          type: integer
          description: "Estimated time remaning in seconds"
        speed_mbs:
          type: integer
          description: "Realtime speed in Mbytes/s"
        cpu_usage:
          type: integer
          description: "CPU usage percentage"
        elapsed_seconds:
          type: integer
          description: "Elapsed time in seconds"
        block_begin:
          type: integer
          description: "Starting block index"
        block_end:
          type: integer
          description: "Ending block index + 1"
        block_count:
          type: integer
          description: "Number of blocks to process. It may be less than block_end - block_begin + 1 if some blocks are going to be skipped"
        block_idx:
          type: integer
          description: "Current block index position processed"
        block_done:
          type: integer
          description: "Number of blocks processed"
        size_done:
          type: integer
          format: int64
          description: "Size of blocks processed"
        messages:
          type: array
          description: "List of messages"
          items:
            type: string
        errors:
          type: array
          description: "List of errors found."
          items:
            $ref: '#/components/schemas/CommandError'

    CommandError:
      type: object
      required:
        - reference_type
        - message
        - disk_name
      properties:
        reference_type:
          type: string
          enum: [file, parity, directory, symlink, hardlink, outofparity]
        message:
          type: string
          description: "Nature of the error (e.g., checksum, read error, size mismatch)."
        disk_name:
          type: string
          description: "The SnapRAID name of the disk (e.g., d1, p1)."
          example: "d1"
        path:
          type: string
          description: "Primary path of the object. Used for files, directories, and links."
          example: "/mnt/d1/data/link_to_file"
        target_path:
          type: string
          description: "The destination of the link. Used only for symlink and hardlink types."
          example: "/mnt/d1/archive/original_file"
        block_number:
          type: integer
          format: int64
          description: "Block number where the error occurred (relevant for file and parity)."

    Device:
      type: object
      required:
        - device_node
      properties:
        device_node:
          type: string
          description: "System device path (e.g., /dev/sdb1)"
        family:
          type: string
          example: "Vendor and Model Family, like: Western Digital Red"
        model:
          type: string
          example: "WDC WD40EFRX-68N32N0"
        serial:
          type: string
          example: "WD-WCC7K1XN2L3P"          
        power:
          type: string
          enum: [active, standby]
          description: "Current power state of the physical drive"
        health:
          type: string
          enum: [passed, failing]
          description: "Current health state"
        size:
          type: integer
          format: int64
          description: "Size in bytes of the raw device"
        rotational:
          type: integer
          description: "If it's a rotational device, and the rotational speed"
        error:
          type: integer
          description: "Number of SMART errors"
        smart_reallocated_sector_count:
          type: integer
        smart_uncorrectable_error_cnt:
          type: integer
        smart_command_timeout:
          type: integer
        smart_current_pending_sector:
          type: integer
        smart_offline_uncorrectable:
          type: integer
        smart_start_stop_count:
          type: integer
        smart_power_on_hours:
          type: integer
        smart_load_cycle_count:
          type: integer
        smart_temperature_celsius:
          type: integer

    DataDisk:
      type: object
      required:
        - name
        - mount_dir
        - devices
      properties:
        name:
          type: string
          description: "Logical name (e.g., d1, d2)"
        mount_dir:
          type: string
          description: "Filesystem mount point path"
        uuid:
          type: string
          description: "Actual UUID of the filesystem containing the mount dir"
        stored_uuid:
          type: string
          description: "Stored UUID of the filesystem containing the mount dir"
        allocated_space_bytes:
          type: integer
          format: int64
        free_space_bytes:
          type: integer
          format: int64
        access_count:
          type: integer
          format: int64
          description: "Total number of read and write accesses performed on the device"
        access_count_initial_time:
          type: integer
          format: int64
          description: "Unix timestamp of the first recorded reading of access_count"
        access_count_idle_duration:
          type: integer
          format: int64
          description: "Duration for which access_count has remained unchanged"
        devices:
          type: array
          items:
            $ref: '#/components/schemas/Device'

    ParitySplit:
      type: object
      required:
        - parity_path
        - devices
      properties:
        parity_path:
          type: string
          description: "Path of the file of the parity"
        uuid:
          type: string
          description: "Actual UUID of the filesystem containing the parity file"
        stored_uuid:
          type: string
          description: "Stored UUID of the filesystem containing the parity file"
        devices:
          type: array
          items:
            $ref: '#/components/schemas/Device'

    ParityDisk:
      type: object
      required:
        - name
        - splits
      properties:
        name:
          type: string
          description: "Logical name (e.g., parity, 2-parity)"
        allocated_space_bytes:
          type: integer
          format: int64
        free_space_bytes:
          type: integer
          format: int64
        access_count:
          type: integer
          format: int64
          description: "Total number of read and write accesses performed on the device"
        access_count_initial_time:
          type: integer
          format: int64
          description: "Unix timestamp of the first recorded reading of access_count"
        access_count_idle_duration:
          type: integer
          format: int64
          description: "Duration for which access_count has remained unchanged"
        splits:
          type: array
          items:
            $ref: '#/components/schemas/ParitySplit'

    Config:
      type: object
      description: The global configuration state for the SnapRAID daemon.
      properties:
        scheduling:
          type: object
          properties:
            scheduled_run:
              type: string
              nullable: true
              example: "daily 02:00"
              description: "The time when the automatic sync+scrub sequence begins."

        monitoring:
          type: object
          properties:
            probe_interval_minutes:
              type: integer
              nullable: true
            spindown_idle_minutes:
              type: integer
              nullable: true

        sync_logic:
          type: object
          properties:
            report_differences:
              type: boolean
              nullable: true
            suspend_on_deletes:
              type: integer
              nullable: true
              description: "Threshold to stop sync if files are missing"
            pre_run_script:
              type: string
              nullable: true
            post_run_script:
              type: string
              nullable: true

        scrub_logic:
          type: object
          properties:
            scrub_percentage:
              type: integer
              nullable: true
              minimum: 0
              maximum: 100

        logging:
          type: object
          properties:
            log_directory:
              type: string
              nullable: true
            log_retention_days:
              type: integer
              nullable: true

        notifications:
          type: object
          properties:
            syslog:
              type: object
              properties:
                enabled:
                  type: boolean
                  nullable: true
                level:
                  type: string
                  enum: [none, error, warning, info]
                  nullable: true
                  description: "Sensitivity for the OS system log."

            heartbeat:
              type: object
              description: "Simple GET ping to monitor uptime (e.g. Healthchecks.io)."
              properties:
                url:
                  type: string
                  nullable: true
                  format: uri
                  example: "https://hc-ping.com/uuid"

            apprise:
              type: object
              description: "Integration with Apprise CLI for push alerts (Discord/Telegram/etc)."
              properties:
                url:
                  type: string
                  nullable: true
                  example: "ntfy://snapraid-alerts"
                level:
                  type: string
                  nullable: true
                  enum: [none, error, warning, info]
                  description: "Sensitivity for Apprise push alerts."

            email:
              type: object
              description: "Local system email using 'mail' or 'sendmail'."
              properties:
                recipient:
                  type: string
                  nullable: true
                  format: email
                  example: "admin@local.host"
                level:
                  type: string
                  enum: [none, error, warning, info]
                  nullable: true
                  description: "Sensitivity for local email reports."
