### SnapRAID Daemon Config
#
# 1. Manual Edits: Safe to edit at any time. To apply changes without 
#    restarting, send a SIGHUP signal (e.g., 'systemctl reload snapraidd' 
#    or 'pkill -HUP snapraidd').
# 2. API Updates: Changes via API REST interface are applied instantly and
#    written to this file. The daemon preserves your comments and '#key=val'
#    toggles.
# 3. Warning: If you edit this file manually while the daemon is running, 
#    ensure you RELOAD before making any API changes, or your manual 
#    edits may be overwritten by the daemon's internal memory state.
#

# The time when the daemon starts the maintenance sequence (Sync followed by Scrub).
# Format: "daily HH:MM" or "weekly <day> HH:MM"
# If unset, sync and scrub are not performed.
scheduled_run = daily 02:00

# The percentage of the array to check in scrub after each sync.
# If 0 or unset, scrub is not performed.
scrub_percentage = 12

### Disk Monitoring
# Check SMART attributes every N minutes (only if disks are already spinning).
# If 0 or unset, no probe is performed.
probe_interval_minutes = 30

# Automatically spin down idle disks after N minutes.
# If 0 or unset, no spindown is performed.
spindown_idle_minutes = 60

### Sync Behavior and Safety
# Report a list of differences in the log. 
# If 0 or unset, differences are not reported.
report_differences = 0

# Suspend the sync if more than N files were deleted. 
# If 0 or unset, never suspend.
suspend_on_deletes = 50

# Scripts to execute before and after SnapRAID sync activity.
pre_run_script = /usr/local/bin/pre-snapraid.sh
post_run_script = /usr/local/bin/post-snapraid.sh

### Logging and Retention
# Directory to store individual command logs.
# If unset, no log is stored.
log_directory = /var/log/snapraid/

# Number of days to retain log files before deletion.
# If 0 or unset, logs are never deleted.
log_retention_days = 30

### Notifications
# Notification of sync activities

# --- System Log (syslog/journald) ---
# Enable logging daemon activity to the OS system log.
# Note: Critical lifecycle events (start, stop, reload) are ALWAYS logged 
# as long as notify_syslog_enabled is true, regardless of the level set below. 
# If 0 or unset, nothing is logged to syslog.
notify_syslog_enabled = 1

# Level: critical, error, warning, info
# This filter applies to SnapRAID task-related messages (sync, scrub, etc.). 
# If unset, assume critical.
notify_syslog_level = error

# --- Heartbeat (Healthchecks.io) ---
# Only pings on successful sync. No level required as it is a binary check.
# If empty or unset, notifications are disabled.
notify_heartbeat_url = https://hc-ping.com/your-uuid-here

# --- Apprise (Push Notifications via Discord, Telegram, etc.) ---
# The Apprise URL/Connection string.
# If empty or unset, notifications are disabled.
notify_apprise_url = ntfy://your-topic

# Level: critical, error, warning, info.
# If unset, assume critical.
notify_apprise_level = error

# --- Local Email ---
# Recipient address for local system mail.
# If empty or unset, notifications are disabled.
notify_email_recipient = admin@example.com

# Level: critical, error, warning, info.
# If unset, assume critical.
notify_email_level = warning
